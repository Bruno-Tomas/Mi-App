<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Búnker - Finanzas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">

    <div class="max-w-md mx-auto p-4">
        <header class="py-6">
            <h1 class="text-3xl font-extrabold text-slate-800">Mi Búnker 🏰</h1>
            <p class="text-slate-500">Gestión de Finanzas Personales</p>
        </header>

        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-8 rounded-3xl shadow-xl mb-8">
            <p class="text-sm uppercase tracking-widest opacity-80 mb-1">Saldo Disponible</p>
            <h2 id="balanceDisplay" class="text-4xl font-mono font-bold">$0.00</h2>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Nuevo Movimiento</label>
            <input type="number" id="montoInput" placeholder="0.00" 
                class="w-full text-3xl font-mono border-b-2 border-slate-100 py-2 mb-6 outline-none focus:border-blue-500 transition-colors">
            
            <div class="flex gap-3">
                <button onclick="registrar(true)" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-emerald-100">
                    + Ingreso
                </button>
                <button onclick="registrar(false)" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-rose-100">
                    - Gasto
                </button>
            </div>
        </div>

        <h3 class="text-lg font-bold text-slate-700 mb-4 px-2">Últimos movimientos</h3>
        <div id="listaMovimientos" class="space-y-3">
            <p class="text-center text-slate-400 py-10">Cargando datos...</p>
        </div>
    </div>

    <script type="module">
        import { db } from './firebaseConfig.js';
        import { collection, addDoc, query, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Función para guardar en la nube
        window.registrar = async (esIngreso) => {
            const input = document.getElementById('montoInput');
            const monto = parseFloat(input.value);
            
            if(!monto || monto <= 0) return alert("Ingresá un monto válido");

            try {
                await addDoc(collection(db, "finanzas"), {
                    monto: monto,
                    tipo: esIngreso ? 'ingreso' : 'gasto',
                    fecha: new Date().toISOString(),
                    timestamp: serverTimestamp()
                });
                input.value = '';
                input.focus();
            } catch (e) {
                console.error("Error al guardar: ", e);
            }
        };

        // Escuchar cambios en tiempo real
        const q = query(collection(db, "finanzas"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('listaMovimientos');
            let balanceTotal = 0;
            lista.innerHTML = '';

            if (snapshot.empty) {
                lista.innerHTML = '<p class="text-center text-slate-400 py-10">No hay movimientos aún.</p>';
            }

            snapshot.forEach((doc) => {
                const item = doc.data();
                const esIngreso = item.tipo === 'ingreso';
                balanceTotal += esIngreso ? item.monto : -item.monto;

                const fechaFormateada = new Date(item.fecha).toLocaleDateString('es-AR', {
                    day: '2-digit', month: 'short'
                });

                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm border border-slate-50 animate-in fade-in duration-500">
                        <div class="flex items-center gap-3">
                            <div class="${esIngreso ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'} w-10 h-10 rounded-full flex items-center justify-center font-bold">
                                ${esIngreso ? '↑' : '↓'}
                            </div>
                            <div>
                                <p class="font-bold text-slate-700">${esIngreso ? 'Ingreso' : 'Gasto'}</p>
                                <p class="text-xs text-slate-400">${fechaFormateada}</p>
                            </div>
                        </div>
                        <span class="font-mono font-bold text-lg ${esIngreso ? 'text-emerald-500' : 'text-rose-500'}">
                            ${esIngreso ? '+' : '-'}$${item.monto.toLocaleString()}
                        </span>
                    </div>
                `;
            });

            document.getElementById('balanceDisplay').innerText = `$${balanceTotal.toLocaleString()}`;
        });
    </script>
</body>
</html>
