<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Búnker Personal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-white transform -translate-x-full transition-transform duration-300 z-50 shadow-2xl">
        <div class="p-6">
            <h2 class="text-2xl font-bold mb-8 text-blue-400">Mi Búnker 🏰</h2>
            <nav class="space-y-2">
                <button onclick="showSection('finanzas')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition">💰 Finanzas</button>
                <button onclick="showSection('tareas')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition">✅ Tareas</button>
                <button onclick="showSection('notas')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition">📝 Notas</button>
                <button onclick="showSection('bunker')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition">🔗 Búnker de Links</button>
                <button onclick="showSection('habitos')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 transition">📅 Hábitos</button>
            </nav>
        </div>
    </div>

    <button onclick="toggleSidebar()" class="fixed top-4 left-4 z-40 bg-white p-3 rounded-full shadow-md border border-slate-200 focus:outline-none">
        <span class="block w-6 h-0.5 bg-slate-600 mb-1"></span>
        <span class="block w-6 h-0.5 bg-slate-600 mb-1"></span>
        <span class="block w-6 h-0.5 bg-slate-600"></span>
    </button>

    <main id="main-content" class="max-w-md mx-auto p-4 pt-20 min-h-screen transition-all duration-300">
        
        <section id="finanzas" class="section active animate-in fade-in">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Finanzas</h2>
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 text-white p-8 rounded-3xl shadow-xl mb-6">
                <p class="text-sm uppercase opacity-80 mb-1">Saldo Disponible</p>
                <h2 id="balanceDisplay" class="text-4xl font-mono font-bold">$0.00</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border mb-6">
                <input type="number" id="montoInput" placeholder="0.00" class="w-full text-3xl font-mono border-b py-2 mb-4 outline-none">
                <div class="flex gap-2">
                    <button onclick="registrar(true)" class="flex-1 bg-emerald-500 text-white font-bold py-4 rounded-xl">+ Ingreso</button>
                    <button onclick="registrar(false)" class="flex-1 bg-rose-500 text-white font-bold py-4 rounded-xl">- Gasto</button>
                </div>
            </div>
            <div id="listaMovimientos" class="space-y-3"></div>
        </section>

        <section id="tareas" class="section animate-in fade-in">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Tareas Pendientes</h2>
            <p class="text-slate-400 italic">Sección en construcción...</p>
        </section>

        <section id="notas" class="section animate-in fade-in">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Mis Notas</h2>
            <p class="text-slate-400 italic">Sección en construcción...</p>
        </section>

        <section id="bunker" class="section animate-in fade-in">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Búnker de Enlaces</h2>
            <p class="text-slate-400 italic">Sección en construcción...</p>
        </section>

        <section id="habitos" class="section animate-in fade-in">
            <h2 class="text-2xl font-bold mb-4 text-slate-800">Tracker de Hábitos</h2>
            <p class="text-slate-400 italic">Sección en construcción...</p>
        </section>

    </main>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black opacity-50 hidden z-40"></div>

    <script type="module">
        import { db } from './firebaseConfig.js';
        import { collection, addDoc, query, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // LÓGICA DE NAVEGACIÓN
        window.toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        window.showSection = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            toggleSidebar(); // Cerramos el menú al elegir
            window.scrollTo(0, 0);
        };

        // LÓGICA DE FINANZAS (La misma que antes)
        window.registrar = async (esIngreso) => {
            const input = document.getElementById('montoInput');
            const monto = parseFloat(input.value);
            if(!monto || monto <= 0) return;
            await addDoc(collection(db, "finanzas"), {
                monto, tipo: esIngreso ? 'ingreso' : 'gasto',
                fecha: new Date().toISOString(),
                timestamp: serverTimestamp()
            });
            input.value = '';
        };

        const qFinanzas = query(collection(db, "finanzas"), orderBy("timestamp", "desc"));
        onSnapshot(qFinanzas, (snapshot) => {
            const lista = document.getElementById('listaMovimientos');
            let balance = 0;
            lista.innerHTML = '';
            snapshot.forEach(doc => {
                const item = doc.data();
                balance += item.tipo === 'ingreso' ? item.monto : -item.monto;
                lista.innerHTML += `<div class="bg-white p-4 rounded-xl flex justify-between shadow-sm border border-slate-100">
                    <span class="text-slate-500">${new Date(item.fecha).toLocaleDateString()}</span>
                    <span class="font-bold ${item.tipo === 'ingreso' ? 'text-emerald-500' : 'text-rose-500'}">
                        ${item.tipo === 'ingreso' ? '+' : '-'}$${item.monto}
                    </span>
                </div>`;
            });
            document.getElementById('balanceDisplay').innerText = `$${balance.toLocaleString()}`;
        });
    </script>
</body>
</html>
