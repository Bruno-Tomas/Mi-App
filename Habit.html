<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker Pro - Bruno</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para los gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1115;
            color: #e2e8f0;
        }

        .glass-card {
            background: rgba(22, 25, 31, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #312e81;
            border-radius: 10px;
        }

        .habit-card:hover {
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .calendar-day.completed {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>
<body class="min-h-screen custom-scrollbar">

    <!-- Header -->
    <header class="sticky top-0 z-50 flex items-center justify-between p-6 border-b border-white/5 bg-[#16191f]/80 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i data-lucide="check-circle-2" class="text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">Hábito Pro</h1>
                <p class="text-xs text-slate-500">Dashboard de Bruno</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl transition-all shadow-lg shadow-indigo-500/20">
                <i data-lucide="plus" size="18"></i>
                <span class="hidden sm:inline font-medium">Nuevo Hábito</span>
            </button>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 p-[2px]">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bruno" class="rounded-full bg-[#1c2128]" alt="Avatar">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Columna Izquierda: Lista y Gráfico Principal -->
        <div class="lg:col-span-8 space-y-8">
            
            <!-- Stats Rápidas -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="glass-card p-5 rounded-2xl flex items-center gap-4">
                    <div class="p-3 bg-emerald-500/10 rounded-xl text-emerald-500">
                        <i data-lucide="trending-up"></i>
                    </div>
                    <div>
                        <p class="text-sm text-slate-400">Racha Actual</p>
                        <p class="text-2xl font-bold">12 Días</p>
                    </div>
                </div>
                <div class="glass-card p-5 rounded-2xl flex items-center gap-4">
                    <div class="p-3 bg-indigo-500/10 rounded-xl text-indigo-500">
                        <i data-lucide="award"></i>
                    </div>
                    <div>
                        <p class="text-sm text-slate-400">Completado</p>
                        <p class="text-2xl font-bold">85%</p>
                    </div>
                </div>
                <div class="glass-card p-5 rounded-2xl flex items-center gap-4">
                    <div class="p-3 bg-amber-500/10 rounded-xl text-amber-500">
                        <i data-lucide="clock"></i>
                    </div>
                    <div>
                        <p class="text-sm text-slate-400">Total Horas</p>
                        <p class="text-2xl font-bold">42h</p>
                    </div>
                </div>
            </div>

            <!-- Hábitos -->
            <div class="space-y-4">
                <h2 class="text-lg font-semibold flex items-center gap-2">
                    <i data-lucide="layout-grid" class="text-indigo-400" size="20"></i>
                    Mis Hábitos
                </h2>
                <div id="habits-container" class="grid grid-cols-1 gap-4">
                    <!-- Los hábitos se insertan aquí con JS -->
                </div>
            </div>

            <!-- Gráfico de Rendimiento -->
            <div class="glass-card p-6 rounded-2xl">
                <h3 class="font-bold text-lg mb-6">Actividad Semanal</h3>
                <div class="h-64">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Columna Derecha: Calendario y Metas -->
        <div class="lg:col-span-4 space-y-6">
            
            <!-- Calendario -->
            <div class="glass-card p-6 rounded-2xl">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="font-bold text-lg">Abril 2026</h3>
                    <div class="flex gap-2">
                        <button class="p-1.5 hover:bg-white/5 rounded-lg"><i data-lucide="chevron-left" size="18"></i></button>
                        <button class="p-1.5 hover:bg-white/5 rounded-lg"><i data-lucide="chevron-right" size="18"></i></button>
                    </div>
                </div>
                
                <div class="grid grid-cols-7 gap-1 text-center mb-2">
                    <span class="text-[10px] font-bold text-slate-500">LU</span>
                    <span class="text-[10px] font-bold text-slate-500">MA</span>
                    <span class="text-[10px] font-bold text-slate-500">MI</span>
                    <span class="text-[10px] font-bold text-slate-500">JU</span>
                    <span class="text-[10px] font-bold text-slate-500">VI</span>
                    <span class="text-[10px] font-bold text-slate-500">SA</span>
                    <span class="text-[10px] font-bold text-slate-500">DO</span>
                </div>
                
                <div id="calendar-grid" class="grid grid-cols-7 gap-2">
                    <!-- Días generados por JS -->
                </div>
            </div>

            <!-- Gráfico de Meta -->
            <div class="glass-card p-6 rounded-2xl text-center">
                <h3 class="font-bold text-lg mb-4">Meta Mensual</h3>
                <div class="relative inline-flex items-center justify-center">
                    <canvas id="goalChart" width="200" height="200"></canvas>
                    <div class="absolute flex flex-col items-center">
                        <span class="text-3xl font-bold">78%</span>
                        <span class="text-[10px] text-slate-500 uppercase">Logrado</span>
                    </div>
                </div>
            </div>

            <!-- Frase Motivacional -->
            <div class="bg-gradient-to-br from-indigo-600 to-purple-600 p-6 rounded-2xl text-white shadow-xl">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="zap" size="16"></i>
                    <span class="text-xs font-bold uppercase tracking-wider">Motivación</span>
                </div>
                <p class="text-sm font-medium">"No te detengas hasta sentirte orgulloso, Bruno. Cada día cuenta."</p>
            </div>
        </div>
    </main>

    <script>
        // Datos iniciales
        const habits = [
            { id: 1, name: 'Entrenamiento PP.FF', icon: '🏃', color: '#f87171', progress: 65 },
            { id: 2, name: 'Lectura Técnica', icon: '📚', color: '#34d399', progress: 40 },
            { id: 3, name: 'Meditación', icon: '🧘', color: '#60a5fa', progress: 90 }
        ];

        const completedDays = [1, 2, 5, 8, 9, 12, 13, 14, 15, 18];

        // Renderizar Hábitos
        const habitsContainer = document.getElementById('habits-container');
        habits.forEach(habit => {
            const html = `
                <div class="habit-card glass-card p-5 rounded-2xl transition-all cursor-pointer overflow-hidden relative">
                    <div class="flex items-center justify-between relative z-10">
                        <div class="flex items-center gap-4">
                            <div class="text-2xl w-12 h-12 rounded-xl flex items-center justify-center bg-white/5">
                                ${habit.icon}
                            </div>
                            <div>
                                <h3 class="font-bold">${habit.name}</h3>
                                <p class="text-xs text-slate-500">Objetivo diario</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="text-sm font-bold" style="color: ${habit.color}">${habit.progress}%</span>
                        </div>
                    </div>
                    <div class="absolute bottom-0 left-0 h-1 bg-white/5 w-full">
                        <div class="h-full transition-all duration-1000" style="width: ${habit.progress}%; background-color: ${habit.color}"></div>
                    </div>
                </div>
            `;
            habitsContainer.innerHTML += html;
        });

        // Renderizar Calendario
        const calendarGrid = document.getElementById('calendar-grid');
        for (let i = 1; i <= 30; i++) {
            const isCompleted = completedDays.includes(i);
            const dayBtn = document.createElement('div');
            dayBtn.className = `aspect-square rounded-lg flex items-center justify-center text-sm font-medium transition-all cursor-pointer calendar-day ${isCompleted ? 'completed' : 'hover:bg-white/5 text-slate-400'}`;
            dayBtn.innerText = i;
            calendarGrid.appendChild(dayBtn);
        }

        // Gráfico Semanal (Lineal)
        const ctxWeekly = document.getElementById('weeklyChart').getContext('2d');
        new Chart(ctxWeekly, {
            type: 'line',
            data: {
                labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'],
                datasets: [{
                    label: 'Hábitos Completados',
                    data: [3, 5, 2, 6, 4, 7, 5],
                    borderColor: '#6366f1',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    pointBackgroundColor: '#6366f1'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { display: false },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                }
            }
        });

        // Gráfico de Dona (Meta)
        const ctxGoal = document.getElementById('goalChart').getContext('2d');
        new Chart(ctxGoal, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [78, 22],
                    backgroundColor: ['#6366f1', '#1c2128'],
                    borderWidth: 0,
                    borderRadius: 10
                }]
            },
            options: {
                cutout: '80%',
                responsive: false,
                plugins: { tooltip: { enabled: false } }
            }
        });

        // Inicializar iconos
        lucide.createIcons();
    </script>
</body>
</html>
