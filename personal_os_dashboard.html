
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); color: var(--color-text-primary); background: transparent; }

  .app { display: flex; height: 620px; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); background: var(--color-background-primary); }

  .sidebar { width: 200px; min-width: 200px; border-right: 0.5px solid var(--color-border-tertiary); padding: 1.5rem 0; display: flex; flex-direction: column; gap: 2px; background: var(--color-background-secondary); }
  .sidebar-logo { padding: 0 1.25rem 1.25rem; font-size: 15px; font-weight: 500; color: var(--color-text-primary); letter-spacing: -0.3px; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 0.5rem; }
  .sidebar-logo span { font-weight: 400; color: var(--color-text-secondary); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 1.25rem; font-size: 13.5px; color: var(--color-text-secondary); cursor: pointer; border-radius: 0; transition: background 0.15s, color 0.15s; border-left: 2px solid transparent; }
  .nav-item:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
  .nav-item.active { color: var(--color-text-primary); background: var(--color-background-primary); border-left: 2px solid var(--color-text-primary); font-weight: 500; }
  .nav-icon { width: 16px; height: 16px; opacity: 0.7; }
  .nav-item.active .nav-icon { opacity: 1; }
  .nav-soon { font-size: 10px; margin-left: auto; color: var(--color-text-tertiary); background: var(--color-background-secondary); padding: 2px 6px; border-radius: 4px; border: 0.5px solid var(--color-border-tertiary); }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; justify-content: space-between; }
  .page-title { font-size: 16px; font-weight: 500; }
  .topbar-date { font-size: 12px; color: var(--color-text-secondary); }

  .content { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

  .section-hidden { display: none; }

  /* Dashboard */
  .metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
  .metric-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .metric-value { font-size: 26px; font-weight: 500; }
  .metric-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }

  .dash-section { }
  .dash-section-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .task-preview { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13.5px; }
  .task-preview:last-child { border-bottom: none; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-high { background: #E24B4A; }
  .dot-med { background: #BA7517; }
  .dot-low { background: #1D9E75; }
  .task-preview-text { flex: 1; color: var(--color-text-primary); }
  .task-preview-text.done { text-decoration: line-through; color: var(--color-text-tertiary); }

  /* Tasks */
  .add-task-bar { display: flex; gap: 8px; }
  .add-task-bar input { flex: 1; height: 36px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 0 12px; font-size: 13.5px; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-primary); outline: none; }
  .add-task-bar input:focus { border-color: var(--color-border-primary); }
  .add-task-bar select { height: 36px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 0 8px; font-size: 13px; font-family: var(--font-sans); color: var(--color-text-primary); background: var(--color-background-primary); outline: none; cursor: pointer; }
  .btn-add { height: 36px; padding: 0 16px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; font-family: var(--font-sans); background: var(--color-text-primary); color: var(--color-background-primary); cursor: pointer; font-weight: 500; }
  .btn-add:hover { opacity: 0.85; }

  .filter-bar { display: flex; gap: 6px; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); font-size: 12px; cursor: pointer; background: transparent; color: var(--color-text-secondary); font-family: var(--font-sans); transition: all 0.15s; }
  .filter-btn.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .filter-btn:hover:not(.active) { border-color: var(--color-border-primary); color: var(--color-text-primary); }

  .task-list { display: flex; flex-direction: column; gap: 2px; }
  .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--border-radius-md); border: 0.5px solid transparent; transition: border-color 0.15s, background 0.15s; }
  .task-item:hover { border-color: var(--color-border-tertiary); background: var(--color-background-secondary); }
  .task-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .task-check.checked { background: var(--color-text-primary); border-color: var(--color-text-primary); }
  .check-icon { display: none; }
  .task-check.checked .check-icon { display: block; }
  .task-text { flex: 1; font-size: 13.5px; cursor: pointer; }
  .task-text.done { text-decoration: line-through; color: var(--color-text-tertiary); }
  .prio-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .prio-alta { background: #FCEBEB; color: #A32D2D; }
  .prio-media { background: #FAEEDA; color: #854F0B; }
  .prio-baja { background: #EAF3DE; color: #3B6D11; }
  .btn-del { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); font-size: 16px; padding: 2px 4px; line-height: 1; opacity: 0; transition: opacity 0.15s; }
  .task-item:hover .btn-del { opacity: 1; }
  .btn-del:hover { color: #E24B4A; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--color-text-tertiary); font-size: 13.5px; }
</style>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">Mi espacio <span>personal</span></div>
    <div class="nav-item active" onclick="showSection('dashboard')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      Dashboard
    </div>
    <div class="nav-item" onclick="showSection('tareas')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3,8 6,11 13,4"/><rect x="1" y="1" width="14" height="14" rx="2"/></svg>
      Tareas
    </div>
    <div class="nav-item" style="cursor:default;">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
      Notas
      <span class="nav-soon">pronto</span>
    </div>
    <div class="nav-item" style="cursor:default;">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L2 6v8h4v-4h4v4h4V6z"/></svg>
      Bunker
      <span class="nav-soon">pronto</span>
    </div>
    <div class="nav-item" style="cursor:default;">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l3 2"/></svg>
      Hábitos
      <span class="nav-soon">pronto</span>
    </div>
    <div class="nav-item" style="cursor:default;">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="14" height="10" rx="1.5"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
      Finanzas
      <span class="nav-soon">pronto</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="page-title" id="page-title">Dashboard</span>
      <span class="topbar-date" id="topbar-date"></span>
    </div>

    <div class="content">

      <!-- DASHBOARD -->
      <div id="sec-dashboard">
        <div class="metrics">
          <div class="metric">
            <div class="metric-label">Tareas pendientes</div>
            <div class="metric-value" id="m-pending">0</div>
            <div class="metric-sub" id="m-pending-sub">de 0 totales</div>
          </div>
          <div class="metric">
            <div class="metric-label">Completadas hoy</div>
            <div class="metric-value" id="m-done">0</div>
            <div class="metric-sub">tareas</div>
          </div>
          <div class="metric">
            <div class="metric-label">Alta prioridad</div>
            <div class="metric-value" id="m-high">0</div>
            <div class="metric-sub">sin completar</div>
          </div>
        </div>

        <div class="dash-section">
          <div class="dash-section-title">Próximas tareas</div>
          <div id="dash-task-preview"></div>
        </div>
      </div>

      <!-- TAREAS -->
      <div id="sec-tareas" class="section-hidden">
        <div class="add-task-bar">
          <input type="text" id="task-input" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter') addTask()">
          <select id="task-prio">
            <option value="baja">Baja</option>
            <option value="media" selected>Media</option>
            <option value="alta">Alta</option>
          </select>
          <button class="btn-add" onclick="addTask()">Agregar</button>
        </div>

        <div class="filter-bar">
          <button class="filter-btn active" onclick="setFilter('todas', this)">Todas</button>
          <button class="filter-btn" onclick="setFilter('pendientes', this)">Pendientes</button>
          <button class="filter-btn" onclick="setFilter('completadas', this)">Completadas</button>
          <button class="filter-btn" onclick="setFilter('alta', this)">Alta prioridad</button>
        </div>

        <div class="task-list" id="task-list"></div>
      </div>

    </div>
  </main>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('pos_tasks') || '[]');
let currentFilter = 'todas';
let currentSection = 'dashboard';

function saveTasks() {
  localStorage.setItem('pos_tasks', JSON.stringify(tasks));
}

function addTask() {
  const input = document.getElementById('task-input');
  const prio = document.getElementById('task-prio').value;
  const text = input.value.trim();
  if (!text) return;
  tasks.unshift({ id: Date.now(), text, prio, done: false, createdAt: new Date().toISOString() });
  saveTasks();
  input.value = '';
  renderTasks();
  updateDashboard();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; t.doneAt = t.done ? new Date().toISOString() : null; }
  saveTasks();
  renderTasks();
  updateDashboard();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderTasks();
  updateDashboard();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

function getFiltered() {
  if (currentFilter === 'pendientes') return tasks.filter(t => !t.done);
  if (currentFilter === 'completadas') return tasks.filter(t => t.done);
  if (currentFilter === 'alta') return tasks.filter(t => t.prio === 'alta' && !t.done);
  return tasks;
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const filtered = getFiltered();
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">No hay tareas aquí todavía</div>';
    return;
  }
  list.innerHTML = filtered.map(t => `
    <div class="task-item">
      <div class="task-check ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})">
        <svg class="check-icon" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
      </div>
      <span class="task-text ${t.done ? 'done' : ''}" onclick="toggleTask(${t.id})">${t.text}</span>
      <span class="prio-badge prio-${t.prio}">${t.prio}</span>
      <button class="btn-del" onclick="deleteTask(${t.id})">×</button>
    </div>
  `).join('');
}

function updateDashboard() {
  const pending = tasks.filter(t => !t.done);
  const today = new Date().toDateString();
  const doneToday = tasks.filter(t => t.done && t.doneAt && new Date(t.doneAt).toDateString() === today);
  const highPending = tasks.filter(t => t.prio === 'alta' && !t.done);

  document.getElementById('m-pending').textContent = pending.length;
  document.getElementById('m-pending-sub').textContent = `de ${tasks.length} totales`;
  document.getElementById('m-done').textContent = doneToday.length;
  document.getElementById('m-high').textContent = highPending.length;

  const preview = document.getElementById('dash-task-preview');
  const next = tasks.filter(t => !t.done).slice(0, 5);
  if (!next.length) {
    preview.innerHTML = '<div class="empty-state" style="padding: 1.5rem 0; text-align:left;">Sin tareas pendientes — ¡todo al día!</div>';
    return;
  }
  preview.innerHTML = next.map(t => `
    <div class="task-preview">
      <div class="dot dot-${t.prio === 'alta' ? 'high' : t.prio === 'media' ? 'med' : 'low'}"></div>
      <span class="task-preview-text">${t.text}</span>
      <span class="prio-badge prio-${t.prio}" style="font-size:10px;">${t.prio}</span>
    </div>
  `).join('');
}

function showSection(s) {
  document.getElementById('sec-dashboard').classList.add('section-hidden');
  document.getElementById('sec-tareas').classList.add('section-hidden');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  document.getElementById('sec-' + s).classList.remove('section-hidden');
  event.currentTarget.classList.add('active');

  const titles = { dashboard: 'Dashboard', tareas: 'Tareas' };
  document.getElementById('page-title').textContent = titles[s] || s;
  currentSection = s;
  if (s === 'tareas') renderTasks();
}

// Init date
const now = new Date();
document.getElementById('topbar-date').textContent = now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });

// Init demo tasks if empty
if (!tasks.length) {
  tasks = [
    { id: 1, text: 'Revisar presupuesto mensual', prio: 'alta', done: false, createdAt: new Date().toISOString() },
    { id: 2, text: 'Leer 30 minutos', prio: 'baja', done: false, createdAt: new Date().toISOString() },
    { id: 3, text: 'Responder emails pendientes', prio: 'media', done: false, createdAt: new Date().toISOString() },
  ];
  saveTasks();
}

updateDashboard();
</script>
