
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); color: var(--color-text-primary); background: transparent; }

.app { display: flex; height: 640px; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); background: var(--color-background-primary); }

/* SIDEBAR */
.sidebar { width: 210px; min-width: 210px; border-right: 0.5px solid var(--color-border-tertiary); padding: 1rem 0; display: flex; flex-direction: column; background: var(--color-background-secondary); overflow-y: auto; }
.sidebar-logo { padding: 0 1rem 1rem; font-size: 14px; font-weight: 500; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 22px; height: 22px; border-radius: 50%; background: var(--color-text-primary); display: flex; align-items: center; justify-content: center; }
.logo-dot svg { width: 12px; height: 12px; stroke: var(--color-background-primary); fill: none; }

.add-btn { margin: 0.5rem 1rem; display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: var(--border-radius-md); font-size: 13.5px; color: var(--color-text-secondary); cursor: pointer; transition: background 0.15s; border: none; background: none; font-family: var(--font-sans); width: calc(100% - 2rem); }
.add-btn:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
.add-btn .plus { width: 20px; height: 20px; border-radius: 50%; background: #E24B4A; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; line-height: 1; flex-shrink: 0; }

.nav-section { padding: 0 0 0.5rem; }
.nav-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); padding: 0.75rem 1rem 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 6px 1rem; font-size: 13.5px; color: var(--color-text-secondary); cursor: pointer; transition: background 0.12s, color 0.12s; position: relative; border-radius: 0; }
.nav-item:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
.nav-item.active { color: var(--color-text-primary); background: var(--color-background-primary); font-weight: 500; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-count { margin-left: auto; font-size: 12px; color: var(--color-text-tertiary); }
.nav-item.active .nav-count { color: #E24B4A; font-weight: 500; }
.nav-soon { font-size: 10px; margin-left: auto; color: var(--color-text-tertiary); background: var(--color-background-secondary); padding: 2px 5px; border-radius: 3px; border: 0.5px solid var(--color-border-tertiary); }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

.main-content { flex: 1; overflow-y: auto; padding: 2rem 2.5rem; }
.view-title { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }

/* Quick add bar */
.quick-add { display: flex; align-items: center; gap: 10px; padding: 10px 0; color: var(--color-text-tertiary); cursor: pointer; font-size: 14px; border-bottom: 0.5px solid transparent; transition: border-color 0.15s; margin-bottom: 0.5rem; }
.quick-add:hover { color: #E24B4A; }
.quick-add .qa-plus { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 14px; line-height: 1; flex-shrink: 0; }

/* Task list */
.task-group { margin-bottom: 1.5rem; }
.group-label { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.group-label::after { content: ''; flex: 1; height: 0.5px; background: var(--color-border-tertiary); }

.task-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary); group: true; }
.task-row:last-child { border-bottom: none; }
.task-circle { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.task-circle:hover { border-color: #E24B4A; background: #FCEBEB; }
.task-circle.p-alta { border-color: #E24B4A; }
.task-circle.p-media { border-color: #BA7517; }
.task-circle.p-baja { border-color: #1D9E75; }
.task-circle.done { background: var(--color-border-secondary); border-color: var(--color-border-secondary); }
.task-circle.done::after { content: ''; width: 8px; height: 5px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translateY(-1px); display: block; }
.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 14px; line-height: 1.4; }
.task-name.done { text-decoration: line-through; color: var(--color-text-tertiary); }
.task-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.tag { font-size: 11px; padding: 1px 7px; border-radius: 10px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); display: flex; align-items: center; gap: 3px; }
.tag svg { width: 10px; height: 10px; }
.tag.date-tag { color: #185FA5; border-color: #B5D4F4; background: #E6F1FB; }
.tag.date-tag.overdue { color: #A32D2D; border-color: #F7C1C1; background: #FCEBEB; }
.tag.date-tag.today { color: #854F0B; border-color: #FAC775; background: #FAEEDA; }
.tag.prio-alta { color: #A32D2D; border-color: #F7C1C1; background: #FCEBEB; }
.tag.prio-media { color: #854F0B; border-color: #FAC775; background: #FAEEDA; }
.tag.prio-baja { color: #3B6D11; border-color: #C0DD97; background: #EAF3DE; }
.task-actions { opacity: 0; display: flex; gap: 4px; }
.task-row:hover .task-actions { opacity: 1; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); padding: 2px; border-radius: 4px; }
.icon-btn:hover { color: var(--color-text-primary); background: var(--color-background-secondary); }
.icon-btn svg { width: 14px; height: 14px; display: block; }

.empty-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: var(--color-text-tertiary); gap: 8px; }
.empty-view svg { width: 40px; height: 40px; opacity: 0.3; }
.empty-view p { font-size: 14px; }

/* MODAL OVERLAY */
.overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.25); display: none; align-items: center; justify-content: center; z-index: 100; border-radius: var(--border-radius-lg); }
.overlay.open { display: flex; }

.modal { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-secondary); width: 520px; max-width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
.modal-body { padding: 1rem 1.25rem 0.75rem; }
.modal-name { width: 100%; border: none; outline: none; font-size: 16px; font-weight: 500; font-family: var(--font-sans); color: var(--color-text-primary); background: transparent; margin-bottom: 6px; }
.modal-name::placeholder { color: var(--color-text-tertiary); font-weight: 400; }
.modal-desc { width: 100%; border: none; outline: none; font-size: 13px; font-family: var(--font-sans); color: var(--color-text-secondary); background: transparent; resize: none; height: 24px; }
.modal-desc::placeholder { color: var(--color-text-tertiary); }

.detected-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; background: #FAEEDA; color: #854F0B; padding: 2px 8px; border-radius: 4px; margin: 4px 0 8px; }
.detected-badge button { background: none; border: none; cursor: pointer; color: #854F0B; font-size: 14px; line-height: 1; padding: 0 0 0 2px; }

.modal-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 0; border-top: 0.5px solid var(--color-border-tertiary); }
.chip { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: 6px; font-size: 12.5px; color: var(--color-text-secondary); cursor: pointer; background: none; font-family: var(--font-sans); transition: background 0.12s, border-color 0.12s; }
.chip:hover { background: var(--color-background-secondary); border-color: var(--color-border-secondary); color: var(--color-text-primary); }
.chip.selected { border-color: var(--color-border-primary); color: var(--color-text-primary); background: var(--color-background-secondary); }
.chip svg { width: 13px; height: 13px; flex-shrink: 0; }
.chip.chip-alta { border-color: #F7C1C1; color: #A32D2D; background: #FCEBEB; }
.chip.chip-media { border-color: #FAC775; color: #854F0B; background: #FAEEDA; }
.chip.chip-baja { border-color: #C0DD97; color: #3B6D11; background: #EAF3DE; }

.modal-footer { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.25rem; border-top: 0.5px solid var(--color-border-tertiary); }
.footer-left { font-size: 12.5px; color: var(--color-text-secondary); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.footer-left svg { width: 14px; height: 14px; }
.footer-actions { display: flex; gap: 8px; }
.btn-cancel { padding: 6px 14px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); font-size: 13px; background: none; color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); }
.btn-cancel:hover { background: var(--color-background-secondary); }
.btn-save { padding: 6px 16px; border: none; border-radius: var(--border-radius-md); font-size: 13px; background: #E24B4A; color: white; cursor: pointer; font-family: var(--font-sans); font-weight: 500; opacity: 0.5; pointer-events: none; transition: opacity 0.15s; }
.btn-save.ready { opacity: 1; pointer-events: all; }
.btn-save.ready:hover { background: #A32D2D; }

/* Prio picker dropdown */
.prio-dropdown { position: absolute; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); z-index: 200; min-width: 140px; padding: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); display: none; }
.prio-dropdown.open { display: block; }
.prio-opt { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 5px; font-size: 13px; cursor: pointer; }
.prio-opt:hover { background: var(--color-background-secondary); }
.prio-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>

  <!-- MAIN -->
  <main class="main">

    <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">

        <div class="modal-body">
          <input class="modal-name" id="modal-name" placeholder="Nombre de la tarea" oninput="onNameInput()" onkeydown="handleModalKey(event)" autocomplete="off">

              <div class="prio-opt" onclick="setPrio('baja')"><span class="prio-dot" style="background:#1D9E75;"></span>Baja</div>
              <div class="prio-opt" onclick="setPrio(null)"><span class="prio-dot" style="background:var(--color-border-secondary);"></span>Sin prioridad</div>

            Bandeja de entrada
          </div>
          <div class="footer-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-save" id="btn-save" onclick="saveTask()">Añadir tarea</button>
          </div>
        </div>

    </div>
  </main>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('pos_tasks_v2') || '[]');
let currentView = 'inbox';
let editingPrio = null;
let editingDate = null;
let detectedDateStr = null;
let detectedDateLabel = null;

const NATURAL_DATES = [
  { re: /\bhoy\b/i, label: 'Hoy', offset: 0 },
  { re: /\bmaña(na)?\b/i, label: 'Mañana', offset: 1 },
  { re: /\bpasado mañana\b/i, label: 'Pasado mañana', offset: 2 },
  { re: /\blunes\b/i, label: 'Lunes', day: 1 },
  { re: /\bmartes\b/i, label: 'Martes', day: 2 },
  { re: /\bmiércoles\b|\bmiercoles\b/i, label: 'Miércoles', day: 3 },
  { re: /\bjueves\b/i, label: 'Jueves', day: 4 },
  { re: /\bviernes\b/i, label: 'Viernes', day: 5 },
];

function nextWeekday(targetDay) {
  const d = new Date();
  const cur = d.getDay();
  let diff = targetDay - cur;
  if (diff <= 0) diff += 7;
  d.setDate(d.getDate() + diff);
  return d;
}

function dateFromOffset(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d;
}

function toISO(d) { return d.toISOString().split('T')[0]; }

function detectNatural(text) {
  for (const rule of NATURAL_DATES) {
    if (rule.re.test(text)) {
      const d = rule.offset !== undefined ? dateFromOffset(rule.offset) : nextWeekday(rule.day);
      return { label: rule.label, date: toISO(d), re: rule.re };
    }
  }
  return null;
}

function onNameInput() {
  const val = document.getElementById('modal-name').value;
  const detected = detectNatural(val);
  const dd = document.getElementById('detected-date');
  const lbl = document.getElementById('detected-label');
  const savebtn = document.getElementById('btn-save');
  if (detected && !editingDate) {
    detectedDateStr = detected.date;
    detectedDateLabel = detected.label;
    lbl.textContent = detected.label;
    dd.style.display = 'inline-flex';
  } else if (!editingDate) {
    detectedDateStr = null;
    detectedDateLabel = null;
    dd.style.display = 'none';
  }
  savebtn.classList.toggle('ready', val.trim().length > 0);
}

function clearDetected() {
  detectedDateStr = null;
  detectedDateLabel = null;
  document.getElementById('detected-date').style.display = 'none';
}

function toggleDatePicker() {
  const di = document.getElementById('date-input');
  di.style.pointerEvents = 'auto';
  di.click();
  setTimeout(() => { di.style.pointerEvents = 'none'; }, 200);
}

function onDateChange() {
  const di = document.getElementById('date-input');
  editingDate = di.value;
  detectedDateStr = null;
  detectedDateLabel = null;
  document.getElementById('detected-date').style.display = 'none';
  const lbl = document.getElementById('chip-date-label');
  if (editingDate) {
    const d = new Date(editingDate + 'T12:00:00');
    lbl.textContent = d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
    document.getElementById('chip-date').classList.add('selected');
  } else {
    lbl.textContent = 'Fecha';
    document.getElementById('chip-date').classList.remove('selected');
  }
}

function togglePrioDropdown() {
  document.getElementById('prio-dd').classList.toggle('open');
}

function setPrio(p) {
  editingPrio = p;
  const lbl = document.getElementById('chip-prio-label');
  const chip = document.getElementById('chip-prio');
  chip.className = 'chip';
  if (p) {
    lbl.textContent = p.charAt(0).toUpperCase() + p.slice(1);
    chip.classList.add('chip-' + p);
  } else {
    lbl.textContent = 'Prioridad';
  }
  document.getElementById('prio-dd').classList.remove('open');
}

function handleModalKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveTask(); }
  if (e.key === 'Escape') closeModal();
}

function openModal() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal-name').focus();
  editingPrio = null;
  editingDate = null;
  detectedDateStr = null;
  document.getElementById('modal-name').value = '';
  document.getElementById('modal-desc').value = '';
  document.getElementById('detected-date').style.display = 'none';
  document.getElementById('btn-save').classList.remove('ready');
  document.getElementById('chip-prio-label').textContent = 'Prioridad';
  document.getElementById('chip-prio').className = 'chip';
  document.getElementById('chip-date-label').textContent = 'Fecha';
  document.getElementById('chip-date').classList.remove('selected');
  document.getElementById('date-input').value = '';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('prio-dd').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function saveTask() {
  const name = document.getElementById('modal-name').value.trim();
  if (!name) return;
  const finalDate = editingDate || detectedDateStr || null;
  tasks.unshift({
    id: Date.now(),
    name,
    desc: document.getElementById('modal-desc').value.trim(),
    prio: editingPrio,
    date: finalDate,
    done: false,
    doneAt: null,
    createdAt: new Date().toISOString()
  });
  localStorage.setItem('pos_tasks_v2', JSON.stringify(tasks));
  closeModal();
  renderView();
  updateCounts();
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  t.doneAt = t.done ? new Date().toISOString() : null;
  localStorage.setItem('pos_tasks_v2', JSON.stringify(tasks));
  renderView();
  updateCounts();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem('pos_tasks_v2', JSON.stringify(tasks));
  renderView();
  updateCounts();
}

function todayISO() { return toISO(new Date()); }

function getViewTasks() {
  const today = todayISO();
  if (currentView === 'inbox') return tasks.filter(t => !t.date);
  if (currentView === 'hoy') return tasks.filter(t => t.date === today);
  if (currentView === 'proximo') return tasks.filter(t => t.date && t.date > today);
  return tasks;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  const today = todayISO();
  const tomorrow = toISO(dateFromOffset(1));
  if (iso === today) return 'Hoy';
  if (iso === tomorrow) return 'Mañana';
  return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' });
}

function renderTaskRow(t) {
  const today = todayISO();
  const overdue = t.date && t.date < today && !t.done;
  const isToday = t.date === today;
  let meta = '';
  if (t.date) {
    const cls = overdue ? 'date-tag overdue' : isToday ? 'date-tag today' : 'date-tag';
    meta += `<span class="tag ${cls}"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="0.5" y="1" width="9" height="8" rx="1"/><path d="M0.5 4h9"/></svg>${formatDate(t.date)}</span>`;
  }
  if (t.prio) meta += `<span class="tag prio-${t.prio}">${t.prio}</span>`;
  if (t.desc) meta += `<span class="tag" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.desc}</span>`;

  const circleClass = 'task-circle' + (t.done ? ' done' : (t.prio ? ' p-' + t.prio : ''));
  return `<div class="task-row">
    <div class="${circleClass}" onclick="toggleDone(${t.id})"></div>
    <div class="task-body">
      <div class="task-name${t.done ? ' done' : ''}">${t.name}</div>
      ${meta ? `<div class="task-meta">${meta}</div>` : ''}
    </div>
    <div class="task-actions">
      <button class="icon-btn" onclick="deleteTask(${t.id})" title="Eliminar">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h10M5 4V2.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5V4M6 7v4M8 7v4M3 4l.7 7.3a1 1 0 0 0 1 .7h4.6a1 1 0 0 0 1-.7L11 4"/></svg>
      </button>
    </div>
  </div>`;
}

function renderView() {
  const area = document.getElementById('task-area');
  const list = getViewTasks();
  if (!list.length) {
    const msgs = {
      inbox: 'Sin tareas en la bandeja. ¡Todo capturado!',
      hoy: 'No hay tareas para hoy.',
      proximo: 'No hay tareas próximas.'
    };
    area.innerHTML = `<div class="quick-add" onclick="openModal()"><span class="qa-plus">+</span> Añadir tarea</div>
    <div class="empty-view">
      <svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="8" width="32" height="26" rx="3"/><path d="M4 16h32M13 8V4M27 8V4"/></svg>
      <p>${msgs[currentView] || ''}</p>
    </div>`;
    return;
  }
  const pending = list.filter(t => !t.done);
  const done = list.filter(t => t.done);
  let html = `<div class="quick-add" onclick="openModal()"><span class="qa-plus">+</span> Añadir tarea</div>`;
  if (pending.length) html += `<div class="task-group">${pending.map(renderTaskRow).join('')}</div>`;
  if (done.length) html += `<div class="task-group"><div class="group-label">Completadas (${done.length})</div>${done.map(renderTaskRow).join('')}</div>`;
  area.innerHTML = html;
}

function updateCounts() {
  const today = todayISO();
  document.getElementById('nc-inbox').textContent = tasks.filter(t => !t.date && !t.done).length || '';
  document.getElementById('nc-hoy').textContent = tasks.filter(t => t.date === today && !t.done).length || '';
  document.getElementById('nc-prox').textContent = tasks.filter(t => t.date && t.date > today && !t.done).length || '';
}

function setView(v, el) {
  currentView = v;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const titles = { inbox: 'Bandeja de entrada', hoy: 'Hoy', proximo: 'Próximo' };
  document.getElementById('view-title').textContent = titles[v];
  renderView();
}

if (!tasks.length) {
  const t = todayISO();
  tasks = [
    { id: 1, name: 'Revisar presupuesto mensual', prio: 'alta', date: t, done: false, doneAt: null, desc: '', createdAt: new Date().toISOString() },
    { id: 2, name: 'Leer 30 minutos', prio: 'baja', date: null, done: false, doneAt: null, desc: '', createdAt: new Date().toISOString() },
    { id: 3, name: 'Responder emails pendientes', prio: 'media', date: null, done: false, doneAt: null, desc: '', createdAt: new Date().toISOString() },
  ];
  localStorage.setItem('pos_tasks_v2', JSON.stringify(tasks));
}
renderView();
updateCounts();
</script>
