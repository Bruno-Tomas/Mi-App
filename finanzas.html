<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búnker Finanzas - Bruno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; color: #e2e8f0; }
        .glass-card { background: rgba(22, 25, 31, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
        .input-dark { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="sidebar-container" class="shrink-0 h-full overflow-y-auto"></div>

    <div class="flex-1 flex flex-col min-w-0 bg-[#0f1115]">
        
        <header class="p-6 border-b border-white/5 bg-[#16191f]/80 backdrop-blur-md shrink-0">
            <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Control de Gastos</h1>
                    <p class="text-xs text-slate-500">Gestión de capital de Bruno</p>
                </div>

                <div class="flex gap-4 sm:gap-8 bg-black/20 p-4 rounded-2xl border border-white/5">
                    <div class="text-center">
                        <p class="text-[10px] uppercase text-slate-500 font-bold">Ingresos</p>
                        <p id="total-ingresos" class="text-emerald-400 font-bold text-lg">$0</p>
                    </div>
                    <div class="w-[1px] bg-white/10 h-10"></div>
                    <div class="text-center">
                        <p class="text-[10px] uppercase text-slate-500 font-bold">Gastos</p>
                        <p id="total-gastos" class="text-rose-400 font-bold text-lg">$0</p>
                    </div>
                    <div class="w-[1px] bg-white/10 h-10"></div>
                    <div class="text-center px-2">
                        <p class="text-[10px] uppercase text-indigo-400 font-bold">Saldo Actual</p>
                        <p id="saldo-actual" class="text-white font-bold text-xl">$0</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto custom-scrollbar p-6">
            <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass-card p-6 rounded-3xl border-indigo-500/20 shadow-2xl">
                        <h3 class="font-bold mb-4 flex items-center gap-2">
                            <i data-lucide="plus-circle" class="text-indigo-400 w-5 h-5"></i>
                            Registrar Movimiento
                        </h3>
                        <form id="finance-form" class="space-y-4">
                            <div>
                                <label class="text-[10px] text-slate-500 font-bold uppercase">Monto</label>
                                <input type="number" id="amount" required placeholder="0.00" 
                                    class="w-full input-dark p-3 rounded-xl focus:border-indigo-500 outline-none text-xl font-bold">
                            </div>
                            <div>
                                <label class="text-[10px] text-slate-500 font-bold uppercase">Categoría</label>
                                <select id="category" class="w-full input-dark p-3 rounded-xl outline-none">
                                    <option value="Comida">🍕 Comida</option>
                                    <option value="Servicios">⚡ Servicios</option>
                                    <option value="Transporte">🚗 Transporte</option>
                                    <option value="Sueldo">💰 Sueldo / Ingreso</option>
                                    <option value="Otros">📦 Otros</option>
                                </select>
                            </div>
                            <div class="flex gap-2">
                                <button type="button" onclick="setTipo('ingreso')" id="btn-ingreso" class="flex-1 py-3 rounded-xl border border-emerald-500/30 text-emerald-500 font-bold text-xs hover:bg-emerald-500/10 transition-all">INGRESO</button>
                                <button type="button" onclick="setTipo('gasto')" id="btn-gasto" class="flex-1 py-3 rounded-xl border border-rose-500/30 text-rose-500 font-bold text-xs hover:bg-rose-500/10 transition-all">GASTO</button>
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold text-white shadow-lg shadow-indigo-600/20 transition-all">
                                Guardar Registro
                            </button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-8 space-y-4">
                    <h2 class="text-lg font-semibold flex items-center justify-between">
                        <span class="flex items-center gap-2">
                            <i data-lucide="history" class="text-indigo-400 w-5 h-5"></i>
                            Historial Reciente
                        </span>
                    </h2>
                    
                    <div id="transactions-list" class="space-y-3">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <script src="menu.js"></script>
    <script type="module">
        import { db } from './firebaseConfig.js';
        import { collection, addDoc, query, onSnapshot, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        lucide.createIcons();
        let currentTipo = 'gasto';

        // Estética de botones de tipo
        window.setTipo = (t) => {
            currentTipo = t;
            document.getElementById('btn-ingreso').className = t === 'ingreso' ? 'flex-1 py-3 rounded-xl bg-emerald-500 text-black font-bold text-xs transition-all' : 'flex-1 py-3 rounded-xl border border-emerald-500/30 text-emerald-500 font-bold text-xs';
            document.getElementById('btn-gasto').className = t === 'gasto' ? 'flex-1 py-3 rounded-xl bg-rose-500 text-black font-bold text-xs transition-all' : 'flex-1 py-3 rounded-xl border border-rose-500/30 text-rose-500 font-bold text-xs';
        }
        setTipo('gasto');

        // Guardar en Firebase
        document.getElementById('finance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;

            try {
                await addDoc(collection(db, "finanzas"), {
                    monto: amount,
                    categoria: category,
                    tipo: currentTipo,
                    fecha: serverTimestamp()
                });
                document.getElementById('finance-form').reset();
                setTipo('gasto');
            } catch (err) { console.error("Error:", err); }
        });

        // Escuchar cambios y calcular balance
        const q = query(collection(db, "finanzas"), orderBy("fecha", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('transactions-list');
            list.innerHTML = '';
            let ing = 0, gas = 0;

            snapshot.forEach(docSnap => {
                const item = docSnap.data();
                const id = docSnap.id;
                
                // Cálculos
                if(item.tipo === 'ingreso') ing += item.monto;
                else gas += item.monto;

                // Renderizado de cada fila
                const row = document.createElement('div');
                row.className = "glass-card p-4 rounded-2xl flex items-center justify-between group animate-in fade-in duration-500";
                row.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${item.tipo === 'ingreso' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-400'}">
                            <i data-lucide="${item.tipo === 'ingreso' ? 'arrow-up-right' : 'arrow-down-left'}" size="18"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm">${item.categoria}</p>
                            <p class="text-[10px] text-slate-500 uppercase">${item.fecha?.toDate().toLocaleDateString() || 'Hoy'}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <p class="font-bold ${item.tipo === 'ingreso' ? 'text-emerald-400' : 'text-rose-400'}">
                            ${item.tipo === 'ingreso' ? '+' : '-'} $${item.monto.toLocaleString()}
                        </p>
                        <button onclick="deleteMove('${id}')" class="opacity-0 group-hover:opacity-100 p-2 text-slate-600 hover:text-red-500 transition-all">
                            <i data-lucide="trash-2" size="16"></i>
                        </button>
                    </div>
                `;
                list.appendChild(row);
            });

            // Actualizar Balance Arriba
            document.getElementById('total-ingresos').innerText = `+$${ing.toLocaleString()}`;
            document.getElementById('total-gastos').innerText = `-$${gas.toLocaleString()}`;
            document.getElementById('saldo-actual').innerText = `$${(ing - gas).toLocaleString()}`;
            lucide.createIcons();
        });

        window.deleteMove = async (id) => {
            if(confirm("¿Eliminar este registro?")) await deleteDoc(doc(db, "finanzas", id));
        };
    </script>
</body>
</html>
