<!DOCTYPE html>

<body class="bg-[#0f0f0f] text-white flex h-screen overflow-hidden">

    <div id="sidebar-container"></div>

    <main class="flex-1 overflow-y-auto p-8">
        </main>

    <script src="menu.js"></script>
</body>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búnker - Mis Hábitos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Lucide Icons para los iconos modernos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f0f; color: white; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
        .habit-card:hover { border-color: #404040; transform: translateY(-2px); }
        .modal-bg { background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR (Usando el contenedor para menu.js) -->
    <div id="sidebar-container"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-1 flex flex-col overflow-hidden">
        
        <!-- Header -->
        <header class="p-8 flex justify-between items-center border-b border-[#262626]">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Mis Hábitos</h1>
                <p class="text-[#636363] mt-1">Sigue tu progreso diario, Bruno.</p>
            </div>
            <button onclick="openModal()" class="bg-white text-black hover:bg-gray-200 px-4 py-2 rounded-lg font-semibold flex items-center gap-2 transition-all">
                <i data-lucide="plus" class="w-5 h-5"></i>
                Nuevo Hábito
            </button>
        </header>

        <!-- Grid de Hábitos -->
        <div id="habits-grid" class="flex-1 overflow-y-auto p-8 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 align-start">
            <!-- Los hábitos se cargarán aquí -->
            <div id="loading-state" class="col-span-full py-20 text-center text-[#444]">
                <div class="animate-pulse flex flex-col items-center">
                    <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4"></i>
                    <p>Sincronizando con el Búnker...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL PARA CREAR HÁBITO -->
    <div id="habitModal" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center p-4">
        <div class="bg-[#161616] border border-[#262626] w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b border-[#262626] flex justify-between items-center">
                <h3 class="text-xl font-bold">Crear hábito</h3>
                <button onclick="closeModal()" class="text-[#636363] hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <form id="habitForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-[#636363] uppercase mb-1">Nombre del hábito</label>
                    <input type="text" id="habitName" required placeholder="Ej: Leer, Gimnasio..." 
                        class="w-full bg-[#0f0f0f] border border-[#262626] rounded-xl p-3 focus:outline-none focus:border-blue-500 transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-[#636363] uppercase mb-1">Frecuencia</label>
                        <select id="habitFreq" class="w-full bg-[#0f0f0f] border border-[#262626] rounded-xl p-3 focus:outline-none">
                            <option value="diario">Diario</option>
                            <option value="semanal">Semanal</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-[#636363] uppercase mb-1">Icono</label>
                        <select id="habitIcon" class="w-full bg-[#0f0f0f] border border-[#262626] rounded-xl p-3 focus:outline-none text-xl">
                            <option value="book">📖</option>
                            <option value="dumbbell">💪</option>
                            <option value="droplets">💧</option>
                            <option value="zap">⚡</option>
                            <option value="coffee">☕</option>
                            <option value="brain">🧠</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition-all mt-4">
                    Guardar hábito
                </button>
            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="menu.js"></script>
    <script type="module">
        import { db } from './firebaseConfig.js';
        import { collection, addDoc, query, onSnapshot, orderBy, updateDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Inicializar iconos de Lucide
        lucide.createIcons();

        const modal = document.getElementById('habitModal');
        window.openModal = () => modal.classList.remove('hidden');
        window.closeModal = () => modal.classList.add('hidden');

        // Función para renderizar los círculos de progreso (como en el video)
        function renderProgressDots(count = 0) {
            let dots = '';
            for(let i = 0; i < 5; i++) {
                const isActive = i < count;
                dots += `<div class="w-2.5 h-2.5 rounded-full ${isActive ? 'bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]' : 'bg-[#262626]'}"></div>`;
            }
            return dots;
        }

        // Agregar Hábito a Firebase
        document.getElementById('habitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('habitName').value;
            const freq = document.getElementById('habitFreq').value;
            const icon = document.getElementById('habitIcon').options[document.getElementById('habitIcon').selectedIndex].text;

            try {
                await addDoc(collection(db, "habitos"), {
                    nombre: name,
                    frecuencia: freq,
                    icono: icon,
                    progreso: 0,
                    racha: 0,
                    creado: serverTimestamp()
                });
                document.getElementById('habitForm').reset();
                closeModal();
            } catch (err) {
                console.error("Error guardando:", err);
            }
        });

        // Escuchar cambios en tiempo real
        const q = query(collection(db, "habitos"), orderBy("creado", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('habits-grid');
            grid.innerHTML = '';
            
            if(snapshot.empty) {
                grid.innerHTML = `<div class="col-span-full text-center text-[#444] py-20">No hay hábitos aún. ¡Crea el primero!</div>`;
            }

            snapshot.forEach((hDoc) => {
                const h = hDoc.data();
                const id = hDoc.id;

                const card = document.createElement('div');
                card.className = "habit-card bg-[#161616] border border-[#262626] p-6 rounded-2xl transition-all flex flex-col justify-between";
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <div class="text-3xl p-3 bg-[#1f1f1f] rounded-xl border border-[#262626]">${h.icono}</div>
                            <div class="flex gap-1.5 mt-2">
                                ${renderProgressDots(h.progreso)}
                            </div>
                        </div>
                        <h3 class="text-xl font-semibold mb-1">${h.nombre}</h3>
                        <p class="text-[#636363] text-sm uppercase tracking-wider font-medium">${h.racha} Días • ${h.frecuencia}</p>
                    </div>
                    
                    <div class="mt-8 flex gap-3">
                        <button onclick="logProgress('${id}', ${h.progreso}, ${h.racha})" 
                            class="flex-1 bg-[#262626] hover:bg-[#333] py-2.5 rounded-lg text-sm font-semibold transition-all">
                            Marcar hoy
                        </button>
                        <button onclick="deleteHabit('${id}')" class="p-2 text-[#444] hover:text-red-500 transition-all">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        });

        // Lógica de progreso
        window.logProgress = async (id, currentProg, currentRacha) => {
            let nextProg = currentProg + 1;
            let nextRacha = currentRacha;
            
            if(nextProg > 5) {
                nextProg = 0; // Reinicia el ciclo de puntos
                nextRacha++;  // Aumenta la racha
            }

            await updateDoc(doc(db, "habitos", id), { 
                progreso: nextProg,
                racha: nextRacha
            });
        };

        window.deleteHabit = async (id) => {
            if(confirm("¿Seguro que quieres eliminar este hábito?")) {
                await deleteDoc(doc(db, "habitos", id));
            }
        };
    </script>
</body>
</html>
