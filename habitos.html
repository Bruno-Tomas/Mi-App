<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evoday - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        /* Ajuste para el scroll del contenido principal con el sidebar */
        .main-content {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
        }

        .habit-card {
            background-color: #121212;
            border: 1px solid #1f1f1f;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ... Tus estilos anteriores se mantienen igual ... */
        .glass-nav {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .year-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 24px; }
        .month-mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .mini-dot { aspect-ratio: 1/1; border-radius: 2px; background-color: #1a1a1a; }
        .check-circle { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .check-circle.completed { background-color: currentColor; border-color: transparent; }
        .check-circle.failed { background-color: #ef4444; border-color: transparent; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .animate-zoom { animation: zoomIn 0.2s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input#detail-name-input { background: transparent; border: none; text-align: center; width: 100%; outline: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-[#0f0f0f]">

    <div id="sidebar-container"></div>

    <main class="main-content no-scrollbar p-4 md:p-8">
        <div class="max-w-5xl mx-auto flex flex-col min-h-full">
            
            <header class="flex justify-between items-center mb-12 mt-4">
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-6 h-6 bg-blue-600 rounded flex items-center justify-center">
                            <i class="fas fa-bolt text-white text-[10px]"></i>
                        </div>
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-widest">Evoday</span>
                    </div>
                    <h1 class="text-4xl md:text-6xl font-bold">Hoy</h1>
                </div>
                <button id="toggle-view" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-gray-400 border border-white/5">
                    <i id="view-icon" class="fas fa-th-large text-lg"></i>
                </button>
            </header>

            <div id="habits-container" class="grid gap-4 mb-32"></div>
        </div>
    </main>

    <div id="habit-detail-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-black" onclick="closeModal('habit-detail-modal')"></div>
        <div class="relative w-full h-full bg-black overflow-y-auto no-scrollbar animate-zoom p-6 md:p-16">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-12">
                    <button onclick="closeModal('habit-detail-modal')" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-white border border-white/10">
                        <i class="fas fa-times"></i>
                    </button>
                    <button onclick="deleteCurrentHabit()" class="text-gray-600 hover:text-red-500 transition-colors"><i class="fas fa-trash text-xl"></i></button>
                </div>
                <div class="text-center mb-16">
                    <input type="text" id="detail-name-input" class="text-5xl md:text-8xl font-bold mb-6 text-white cursor-edit" onchange="updateHabitName(this.value)">
                    <div class="flex items-center justify-center gap-8 md:gap-16 flex-wrap">
                        <div class="text-center">
                            <p id="detail-streak" class="text-4xl font-bold">0</p>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Racha en este mes</p>
                        </div>
                        <div class="text-center">
                            <p id="detail-month-count" class="text-4xl font-bold text-blue-500">0</p>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Días logrados</p>
                        </div>
                        <div class="text-center">
                            <p id="detail-rate" class="text-4xl font-bold text-emerald-500">0%</p>
                            <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Efectividad mensual</p>
                        </div>
                    </div>
                </div>
                <div class="bg-[#121212] rounded-[3rem] p-8 border border-white/5 mb-10">
                    <div id="calendar-grid" class="grid grid-cols-7 gap-3 md:gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="add-habit-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" onclick="closeModal('add-habit-modal')"></div>
        <div class="bg-[#121212] w-full max-w-md rounded-[3rem] p-10 relative z-10 border border-white/10 animate-zoom">
            <h2 class="text-3xl font-bold mb-10 text-center">Nuevo Hábito</h2>
            <input type="text" id="habit-name-input" placeholder="Nombre" class="w-full p-5 bg-white/5 rounded-2xl mb-8 outline-none border border-white/5 text-white">
            <div class="flex justify-between mb-12" id="color-picker"></div>
            <button onclick="saveNewHabit()" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-bold">Crear Hábito</button>
        </div>
    </div>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 glass-nav p-5 px-10 flex justify-between items-center z-40">
        <button class="text-blue-500"><i class="fas fa-calendar-day text-2xl"></i></button>
        <button onclick="openModal('add-habit-modal')" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white -mt-12 shadow-2xl border-4 border-black">
            <i class="fas fa-plus text-xl"></i>
        </button>
        <button class="text-gray-500"><i class="fas fa-cog text-2xl"></i></button>
    </nav>

    <script src="menu.js"></script>
    <script>
        /* MANTENÉ TODO TU SCRIPT ORIGINAL AQUÍ (renderHabits, cycleDayStatus, etc.) */
        // ... (Tu código JS anterior)
    </script>
</body>
</html>
