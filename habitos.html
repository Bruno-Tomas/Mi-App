<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HabitForge · Búnker Bruno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #080808; font-family: system-ui, sans-serif; color: #ffffff; }
        .routine-section { background: #161616; border: 1px solid #262626; border-radius: 28px; padding: 20px; margin-bottom: 24px; }
        .habit-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 12px; }
        .btn-blue { background: #2A67F4; color: white; font-weight: 600; padding: 8px 18px; border-radius: 40px; transition: 0.2s; }
        .btn-blue:active { transform: scale(0.95); }
        .streak-badge { background: #2c6e2c; color: #b9fbc0; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
        input, select { background: #1e1e1e; border: 1px solid #3a3a3a; padding: 10px 15px; border-radius: 15px; color: white; outline: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="sidebar-container"></div>

    <main class="flex-1 overflow-y-auto p-6 custom-scrollbar">
        <div class="max-w-3xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold italic tracking-tighter">⚡ HabitForge</h1>
                <div class="bg-[#2A67F4] px-4 py-1 rounded-full text-xs font-bold">BRUNO MODE</div>
            </div>

            <div id="morningSection" class="routine-section">
                <div class="flex items-center gap-2 mb-4 text-xl font-semibold"><span>🌅</span> Mañana</div>
                <div id="morningList"></div>
            </div>

            <div id="afternoonSection" class="routine-section">
                <div class="flex items-center gap-2 mb-4 text-xl font-semibold"><span>☀️</span> Tarde</div>
                <div id="afternoonList"></div>
            </div>

            <div id="nightSection" class="routine-section">
                <div class="flex items-center gap-2 mb-4 text-xl font-semibold"><span>🌙</span> Noche</div>
                <div id="nightList"></div>
            </div>

            <div class="routine-section">
                <h2 class="font-bold mb-4">➕ Nuevo Hábito</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input type="text" id="habitNameInput" placeholder="Nombre (ej: Leer)">
                    <select id="habitRoutineSelect">
                        <option value="morning">Mañana</option>
                        <option value="afternoon">Tarde</option>
                        <option value="night">Noche</option>
                    </select>
                    <input type="number" id="habitTarget" placeholder="Meta numérica" value="1">
                    <button id="addHabitBtn" class="btn-blue">Crear Hábito</button>
                </div>
            </div>
        </div>
    </main>

    <script src="menu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { db } from './firebaseConfig.js';
        import { collection, addDoc, query, onSnapshot, orderBy, updateDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const morningList = document.getElementById('morningList');
        const afternoonList = document.getElementById('afternoonList');
        const nightList = document.getElementById('nightList');

        // LEER DATOS EN TIEMPO REAL
        onSnapshot(query(collection(db, "habitos_v2"), orderBy("fecha", "asc")), (snapshot) => {
            morningList.innerHTML = '';
            afternoonList.innerHTML = '';
            nightList.innerHTML = '';

            snapshot.forEach(docSnap => {
                const h = docSnap.data();
                const id = docSnap.id;
                const isDone = h.progreso >= h.meta;

                const habitHTML = `
                    <div class="habit-item ${isDone ? 'opacity-40' : ''}">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold">${h.nombre}</span>
                                <span class="streak-badge">🔥 ${h.racha || 0}</span>
                            </div>
                            <div class="text-[10px] text-gray-500 uppercase tracking-widest">
                                Progreso: ${h.progreso}/${h.meta}
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="incrementar('${id}', ${h.progreso}, ${h.meta}, ${h.racha || 0})" class="bg-[#1e1e1e] p-2 rounded-lg text-[#2A67F4] font-bold">
                                +1
                            </button>
                            <button onclick="eliminar('${id}')" class="p-2 text-gray-700 hover:text-red-500">
                                <i data-lucide="trash-2" size="16"></i>
                            </button>
                        </div>
                    </div>
                `;

                if (h.momento === 'morning') morningList.innerHTML += habitHTML;
                else if (h.momento === 'afternoon') afternoonList.innerHTML += habitHTML;
                else nightList.innerHTML += habitHTML;
            });
            lucide.createIcons();
        });

        // AGREGAR HÁBITO
        document.getElementById('addHabitBtn').addEventListener('click', async () => {
            const nombre = document.getElementById('habitNameInput').value;
            const momento = document.getElementById('habitRoutineSelect').value;
            const meta = parseInt(document.getElementById('habitTarget').value);

            if (nombre) {
                await addDoc(collection(db, "habitos_v2"), {
                    nombre, momento, meta,
                    progreso: 0,
                    racha: 0,
                    fecha: serverTimestamp()
                });
                document.getElementById('habitNameInput').value = '';
            }
        });

        // LOGICA DE PROGRESO
        window.incrementar = async (id, prog, meta, racha) => {
            const nuevoProg = prog + 1;
            let nuevaRacha = racha;

            if (nuevoProg === meta) {
                nuevaRacha++;
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#2A67F4', '#ffffff'] });
            }

            await updateDoc(doc(db, "habitos_v2", id), {
                progreso: nuevoProg > meta ? 0 : nuevoProg,
                racha: nuevoProg > meta ? racha : nuevaRacha
            });
        };

        window.eliminar = async (id) => {
            if(confirm("¿Borrar hábito?")) await deleteDoc(doc(db, "habitos_v2", id));
        };
    </script>
</body>
</html>
