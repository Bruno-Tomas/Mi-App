<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evoday - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        .habit-card {
            background-color: #121212;
            border: 1px solid #1f1f1f;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .habit-card:hover {
            transform: translateY(-2px);
            background-color: #181818;
            border-color: #333;
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Calendarios y Heatmaps */
        .month-mini-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .mini-dot {
            aspect-ratio: 1/1;
            border-radius: 3px;
            background-color: #1f1f1f;
        }

        /* Checkbox circular estilo iOS */
        .check-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .check-circle.active {
            background-color: currentColor;
            border-color: transparent;
        }

        /* Ocultar scrollbars */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animación de entrada para el detalle a pantalla completa */
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-zoom {
            animation: zoomIn 0.25s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-5xl mx-auto min-h-screen flex flex-col">
        
        <!-- Main Content -->
        <main class="flex-1 pb-32 pt-8 md:pt-16">
            <!-- Header -->
            <header class="px-6 md:px-0 flex justify-between items-center mb-12">
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-6 h-6 bg-blue-500 rounded flex items-center justify-center">
                            <i class="fas fa-bolt text-white text-[10px]"></i>
                        </div>
                        <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">Evoday</span>
                    </div>
                    <h1 id="view-title" class="text-4xl md:text-6xl font-bold">Hoy</h1>
                </div>
                <div class="flex gap-4">
                    <button onclick="openModal('add-habit-modal')" class="hidden md:flex bg-white text-black px-6 py-3 rounded-2xl font-bold items-center gap-2 hover:bg-gray-200 transition-colors">
                        <i class="fas fa-plus"></i> Nuevo
                    </button>
                    <button id="toggle-view" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-gray-400 hover:text-white transition-colors border border-white/5">
                        <i id="view-icon" class="fas fa-th-large text-lg"></i>
                    </button>
                </div>
            </header>

            <!-- Grid de Hábitos -->
            <div id="habits-container" class="px-6 md:px-0 grid gap-4">
                <!-- Inyectado por JS -->
            </div>
        </main>
    </div>

    <!-- Modal Detalle A PANTALLA COMPLETA -->
    <div id="habit-detail-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" onclick="closeModal('habit-detail-modal')"></div>
        
        <div class="relative w-full h-full md:h-[90vh] md:max-w-4xl md:rounded-[3rem] bg-[#0a0a0a] border-white/5 shadow-2xl overflow-y-auto no-scrollbar animate-zoom p-6 md:p-16">
            
            <div class="flex justify-between items-center mb-16">
                <button onclick="closeModal('habit-detail-modal')" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center text-white border border-white/10 hover:bg-white/10">
                    <i class="fas fa-times text-lg"></i>
                </button>
                <div class="flex gap-8">
                    <button class="text-gray-500 hover:text-white text-lg"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteCurrentHabit()" class="text-gray-500 hover:text-red-500 text-lg"><i class="fas fa-trash"></i></button>
                </div>
            </div>

            <div id="detail-header" class="mb-16 text-center">
                <h2 id="detail-name" class="text-5xl md:text-7xl font-bold mb-4">Hábito</h2>
                <div class="flex items-center justify-center gap-6">
                    <div class="text-center">
                        <p id="detail-streak" class="text-3xl font-bold">0</p>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Racha Actual</p>
                    </div>
                    <div class="w-px h-8 bg-white/10"></div>
                    <div class="text-center">
                        <p class="text-3xl font-bold text-blue-500">77%</p>
                        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Tasa de éxito</p>
                    </div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <!-- Calendario Mensual -->
                <div class="bg-[#121212] rounded-[2.5rem] p-8 border border-white/5">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="font-bold text-xl">Octubre 2024</h3>
                        <div class="flex gap-4">
                            <button class="text-gray-500"><i class="fas fa-chevron-left"></i></button>
                            <button class="text-gray-500"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-7 gap-4 text-center text-[10px] text-gray-500 font-bold uppercase mb-6 tracking-widest">
                        <span>Lu</span><span>Ma</span><span>Mi</span><span>Ju</span><span>Vi</span><span>Sa</span><span>Do</span>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-3"></div>
                </div>

                <!-- Heatmap Anual -->
                <div class="bg-[#121212] rounded-[2.5rem] p-8 border border-white/5">
                    <h3 class="font-bold text-xl mb-8">Vista Anual</h3>
                    <div id="year-heatmap" class="grid grid-cols-3 gap-6"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Nuevo Hábito -->
    <div id="add-habit-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-xl" onclick="closeModal('add-habit-modal')"></div>
        <div class="bg-[#121212] w-full max-w-md rounded-[3rem] p-10 relative z-10 border border-white/10 animate-zoom">
            <h2 class="text-3xl font-bold mb-10 text-center">Nuevo Hábito</h2>
            
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-3 block">Nombre</label>
            <input type="text" id="habit-name-input" placeholder="Ej: Meditación" class="w-full p-5 bg-white/5 rounded-2xl mb-8 outline-none border border-white/5 focus:border-blue-500/50 text-white placeholder:text-gray-600">
            
            <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-5 block">Color del Hábito</label>
            <div class="flex justify-between mb-12">
                <button onclick="selectColor('#3b82f6', this)" class="w-10 h-10 rounded-full bg-blue-500 border-2 border-white/20 ring-4 ring-blue-500/30 color-opt"></button>
                <button onclick="selectColor('#ec4899', this)" class="w-10 h-10 rounded-full bg-pink-500 border-2 border-white/20 color-opt"></button>
                <button onclick="selectColor('#f59e0b', this)" class="w-10 h-10 rounded-full bg-amber-500 border-2 border-white/20 color-opt"></button>
                <button onclick="selectColor('#10b981', this)" class="w-10 h-10 rounded-full bg-emerald-500 border-2 border-white/20 color-opt"></button>
                <button onclick="selectColor('#8b5cf6', this)" class="w-10 h-10 rounded-full bg-violet-500 border-2 border-white/20 color-opt"></button>
            </div>

            <div class="flex gap-4">
                <button onclick="closeModal('add-habit-modal')" class="flex-1 p-5 bg-white/5 rounded-2xl font-bold hover:bg-white/10 transition-colors">Cancelar</button>
                <button onclick="saveNewHabit()" class="flex-1 p-5 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-500 transition-colors">Crear</button>
            </div>
        </div>
    </div>

    <!-- Navegación Móvil (Ahora también contiene Ajustes y el botón de crear principal en móvil) -->
    <nav class="fixed bottom-0 left-0 right-0 glass-nav p-5 px-10 flex justify-between items-center z-40">
        <button class="flex flex-col items-center gap-1 text-blue-500"><i class="fas fa-calendar-day text-2xl"></i></button>
        <button class="flex flex-col items-center gap-1 text-gray-500"><i class="far fa-calendar-alt text-2xl"></i></button>
        <button onclick="openModal('add-habit-modal')" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white -mt-12 shadow-2xl shadow-blue-900/60 border-4 border-black"><i class="fas fa-plus text-xl"></i></button>
        <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fas fa-layer-group text-2xl"></i></button>
        <button class="flex flex-col items-center gap-1 text-gray-500"><i class="fas fa-cog text-2xl"></i></button>
    </nav>

    <script>
        let habits = [
            { id: 1, name: 'Meditar', color: '#3b82f6', streak: 48, unit: 'DÍAS', completed: true },
            { id: 2, name: 'Entrenar', color: '#ec4899', streak: 15, unit: 'SEMANAS', completed: false },
            { id: 3, name: 'Guitarra', color: '#f59e0b', streak: 21, unit: 'DÍAS', completed: true },
            { id: 4, name: 'Leer', color: '#10b981', streak: 236, unit: 'DÍAS', completed: true }
        ];

        let currentView = 'list';
        let selectedColor = '#3b82f6';
        let currentHabitId = null;

        function renderHabits() {
            const container = document.getElementById('habits-container');
            container.innerHTML = '';

            if (currentView === 'list') {
                container.className = "px-6 md:px-0 grid grid-cols-1 md:grid-cols-2 gap-4";
                habits.forEach(habit => {
                    const card = document.createElement('div');
                    card.className = `habit-card p-6 rounded-[2.5rem] flex items-center justify-between cursor-pointer`;
                    
                    card.innerHTML = `
                        <div class="flex items-center gap-6 flex-1" onclick="showHabitDetail(${habit.id})">
                            <div class="check-circle ${habit.completed ? 'active' : ''}" style="color: ${habit.color}" onclick="event.stopPropagation(); toggleComplete(${habit.id})">
                                ${habit.completed ? '<i class="fas fa-check text-white text-xs"></i>' : ''}
                            </div>
                            <div>
                                <h3 class="font-bold text-xl">${habit.name}</h3>
                                <div class="flex gap-1.5 mt-2">
                                    ${['S','M','T','W','T','F','S'].map((d, i) => `
                                        <span class="w-5 h-5 rounded-md flex items-center justify-center text-[9px] font-black ${i < 3 ? 'text-white' : 'bg-white/5 text-gray-600'}" 
                                              style="${i < 3 ? `background-color: ${habit.color}` : ''}">${d}</span>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="text-right flex flex-col items-end pr-2" onclick="showHabitDetail(${habit.id})">
                            <div class="flex items-center gap-1.5 font-bold text-2xl">
                                <span>${habit.streak}</span>
                                <i class="fas fa-fire text-sm" style="color: ${habit.color}"></i>
                            </div>
                            <span class="text-[9px] font-bold text-gray-500 tracking-widest uppercase">${habit.unit}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                container.className = "px-6 md:px-0 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4";
                habits.forEach(habit => {
                    const card = document.createElement('div');
                    card.className = `habit-card p-6 rounded-[2.5rem] relative flex flex-col justify-between aspect-square cursor-pointer`;
                    
                    card.innerHTML = `
                        <div onclick="showHabitDetail(${habit.id})">
                            <div class="flex items-center justify-between mb-2">
                                <div class="flex flex-col">
                                    <div class="flex items-center gap-1">
                                        <span class="text-2xl font-bold">${habit.streak}</span>
                                        <i class="fas fa-fire text-sm" style="color: ${habit.color}"></i>
                                    </div>
                                    <span class="text-[9px] font-bold text-gray-500 uppercase">${habit.unit}</span>
                                </div>
                                <div class="check-circle ${habit.completed ? 'active' : ''}" style="color: ${habit.color}" onclick="event.stopPropagation(); toggleComplete(${habit.id})">
                                    ${habit.completed ? '<i class="fas fa-check text-white text-xs"></i>' : ''}
                                </div>
                            </div>
                            <h3 class="font-bold text-lg leading-tight mt-4">${habit.name}</h3>
                        </div>
                        <div class="flex gap-1.5 mt-auto" style="color: ${habit.color}">
                            <div class="w-1.5 h-1.5 rounded-full bg-current"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-current"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-white/10"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-white/10"></div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        function toggleComplete(id) {
            const habit = habits.find(h => h.id === id);
            habit.completed = !habit.completed;
            habit.streak = habit.completed ? habit.streak + 1 : Math.max(0, habit.streak - 1);
            renderHabits();
        }

        function toggleView() {
            currentView = currentView === 'list' ? 'grid' : 'list';
            document.getElementById('view-icon').className = currentView === 'list' ? 'fas fa-th-large text-lg' : 'fas fa-list text-lg';
            renderHabits();
        }

        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
            if(id === 'habit-detail-modal') document.body.classList.add('overflow-hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            if(id === 'habit-detail-modal') document.body.classList.remove('overflow-hidden');
        }

        function selectColor(color, el) {
            selectedColor = color;
            document.querySelectorAll('.color-opt').forEach(btn => btn.classList.remove('ring-4', 'ring-blue-500/30'));
            el.classList.add('ring-4', 'ring-blue-500/30');
        }

        function saveNewHabit() {
            const name = document.getElementById('habit-name-input').value;
            if (!name) return;
            habits.push({ id: Date.now(), name, color: selectedColor, streak: 0, unit: 'DÍAS', completed: false });
            document.getElementById('habit-name-input').value = '';
            closeModal('add-habit-modal');
            renderHabits();
        }

        function showHabitDetail(id) {
            const habit = habits.find(h => h.id === id);
            currentHabitId = id;
            
            document.getElementById('detail-name').innerText = habit.name;
            document.getElementById('detail-name').style.color = habit.color;
            document.getElementById('detail-streak').innerText = habit.streak;
            
            renderCalendar(habit.color);
            renderYearHeatmap(habit.color);
            openModal('habit-detail-modal');
        }

        function renderCalendar(color) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 31; i++) {
                const day = document.createElement('div');
                const isDone = Math.random() > 0.4;
                day.className = `aspect-square flex items-center justify-center rounded-2xl text-[11px] font-bold transition-all cursor-pointer`;
                if (isDone) {
                    day.style.backgroundColor = color;
                    day.style.color = 'white';
                } else {
                    day.className += " bg-white/5 text-gray-600 hover:bg-white/10";
                }
                day.innerText = i;
                grid.appendChild(day);
            }
        }

        function renderYearHeatmap(color) {
            const heatmap = document.getElementById('year-heatmap');
            heatmap.innerHTML = '';
            const months = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
            months.forEach(m => {
                const div = document.createElement('div');
                div.innerHTML = `<p class="text-[8px] text-gray-500 mb-2 font-bold uppercase tracking-widest">${m}</p>`;
                const grid = document.createElement('div');
                grid.className = 'month-mini-grid';
                for(let i=0; i<14; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'mini-dot';
                    if(Math.random() > 0.5) dot.style.backgroundColor = color;
                    grid.appendChild(dot);
                }
                div.appendChild(grid);
                heatmap.appendChild(div);
            });
        }

        function deleteCurrentHabit() {
            if(confirm('¿Eliminar hábito?')) {
                habits = habits.filter(h => h.id !== currentHabitId);
                closeModal('habit-detail-modal');
                renderHabits();
            }
        }

        document.getElementById('toggle-view').addEventListener('click', toggleView);
        window.onload = renderHabits;
    </script>
</body>
</html>
